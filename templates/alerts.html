<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeris.AI - Alerts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div><strong>Aeris.AI</strong></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/rooms">Rooms</a>
        <a href="/alerts">Alerts</a>
        <a href="/immediate">Immediate</a>
    </div>
</div>

<div class="container">
    <h1 class="page-title">Alerts</h1>

    <div class="system-health">
        <h2>System Health</h2>
        <p><strong>Overall Status:</strong> <span class="green">Normal</span></p>
        <p><strong>Active Sensors:</strong> 12</p>
        <p><strong>Last Update:</strong> 2 minutes ago</p>
    </div>

    <div class="alert-section">
        <h2 class="section-title">Recent Alerts</h2>
        <div class="card alert-card danger">
            <h3>Carbon Monoxide Alert</h3>
            <p>Processing Area C - Reading: 45 ppm</p>
            <p>Time: 10:30 AM</p>
        </div>
        <div class="card alert-card warning">
            <h3>Chlorine Warning</h3>
            <p>Storage Area B - Reading: 25 ppm</p>
            <p>Time: 9:45 AM</p>
        </div>
    </div>
</div>

</body>
</html>
