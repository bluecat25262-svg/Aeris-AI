<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aeris.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="phone-shell">
    <div class="app-frame">
        <div class="app-screen">

            <!-- HERO IMAGE AREA -->
            <div class="home-hero">
                <!-- Animated orb stands in for the 3D render -->
                <div style="position:relative; display:flex; align-items:center; justify-content:center; width:100%; height:100%;">
                    <div class="hero-ring"></div>
                    <div class="hero-ring"></div>
                    <div class="hero-ring"></div>
                    <div class="hero-orb"></div>
                </div>
            </div>

            <!-- BADGE -->
            <div class="powered-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Powered by AI
            </div>

            <!-- TITLE -->
            <h1 class="home-title">AI-Driven Methane Detection<br>for a Safer Tomorrow.</h1>

            <!-- CTA -->
            <a class="home-cta" href="/rooms">
                GET STARTED FOR FREE
                <span class="cta-arrow">→</span>
            </a>

            <button class="home-generate-btn" id="home-generate-btn" onclick="requestPiData()">
                Generate Pi Data
                <span id="home-generate-icon">&#10227;</span>
            </button>
            <div id="home-generate-status" class="home-generate-status"></div>

            <!-- SECONDARY -->
            <a class="know-more" href="/about">I want to know more</a>

        </div>
    </div>
</div>
<script>
let homePollInterval = null;

function setHomeGenerateLoading(loading) {
    const btn = document.getElementById('home-generate-btn');
    const icon = document.getElementById('home-generate-icon');
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.65' : '1';
    icon.style.animation = loading ? 'spin 1s linear infinite' : '';
}

function showHomeGenerateStatus(message, color) {
    const status = document.getElementById('home-generate-status');
    status.style.display = 'block';
    status.style.color = color || 'var(--muted)';
    status.textContent = message;
}

function requestPiData() {
    setHomeGenerateLoading(true);
    showHomeGenerateStatus('Sending request to Raspberry Pi...', '#f5a623');

    fetch('/api/trigger/request', { method: 'POST' })
        .then(response => response.json())
        .then(() => {
            showHomeGenerateStatus('Pi is generating and uploading data...', '#f5a623');
            startHomePolling();
        })
        .catch(() => {
            setHomeGenerateLoading(false);
            showHomeGenerateStatus('Failed to send request.', '#ff4c4c');
        });
}

function startHomePolling() {
    if (homePollInterval) clearInterval(homePollInterval);
    let attempts = 0;

    homePollInterval = setInterval(() => {
        attempts++;
        fetch('/api/trigger/status')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'idle' && data.completed_at) {
                    clearInterval(homePollInterval);
                    setHomeGenerateLoading(false);
                    showHomeGenerateStatus('Data refreshed. Opening dashboard...', '#3ddc84');
                    setTimeout(() => window.location.href = '/rooms', 1200);
                }
            });

        if (attempts > 60) {
            clearInterval(homePollInterval);
            setHomeGenerateLoading(false);
            showHomeGenerateStatus('Pi did not respond in time.', '#ff4c4c');
        }
    }, 1000);
}
</script>
</body>
</html>
