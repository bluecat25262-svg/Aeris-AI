<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aeris.AI - Immediate Alerts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div><strong>Aeris.AI</strong></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/rooms">Rooms</a>
        <a href="/alerts">Alerts</a>
        <a href="/immediate">Immediate</a>
    </div>
</div>

<div class="container">

<h1 class="page-title">Immediate & Recent Alerts</h1>

{% for alert in alerts %}

<div class="card">

<h2>{{ alert[1] }} - {{ alert[0] }}</h2>

<p><strong>Reading:</strong> {{ alert[2] }} ppm</p>

<p><strong>Status:</strong> {{ alert[3] }}</p>

<p><strong>Time:</strong> {{ alert[4] }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
