<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aeris.AI - {{ room }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="phone-shell">
    <div class="app-frame">
        <div class="app-screen">

            <!-- BACK HEADER -->
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <div class="back-header">
                        <a class="back-btn" href="/rooms">←</a>
                    </div>
                    <div class="sensor-subtitle">Floor #01</div>
                    <div style="font-family:'Syne',sans-serif; font-size:26px; font-weight:700; color:#fff; margin-top:2px;">{{ room }}</div>
                </div>
            </div>

            <!-- FLOOR MAP -->
            <div class="map-panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="floor-label">Floor #01</span>
                    <div class="map-legend">
                        <div class="legend-item"><span class="dot green"></span>Normal</div>
                        <div class="legend-item"><span class="dot yellow"></span>Warning</div>
                        <div class="legend-item"><span class="dot red"></span>Active Leak</div>
                    </div>
                </div>
                <div class="room-mini" style="min-height:100px;">
                    <span>Room - A</span>
                    <div class="room-dots-field" style="gap:16px; padding:12px 8px;">
                        <span class="dot green"></span>
                        <span class="dot green"></span>
                        <span class="dot yellow" style="margin-top:10px; margin-left:20px;"></span>
                    </div>
                </div>
            </div>

            <!-- ENVIRONMENTAL FACTORS -->
            <div class="env-section-header">
                <span class="env-label">Environmental Factors</span>
                <span class="env-label">Today</span>
            </div>
            <div class="env-grid">
                <div class="env-row">
                    <div class="env-card">Temperature <strong>72°F</strong></div>
                    <div class="env-card">Humidity <strong>45%</strong></div>
                </div>
                <div class="env-card">Pressure <strong>1013 HPA</strong></div>
                <div class="env-card">Air Quality <strong>Moderate</strong></div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
