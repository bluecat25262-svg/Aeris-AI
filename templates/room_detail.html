<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aeris.AI - {{ room }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="phone-shell">
    <div class="app-frame">
        <div class="app-screen">
            <div class="screen-header">
                <div class="screen-title">
                    <span class="back-arrow">←</span>
                    <div>
                        <p class="subtitle">Floor #01</p>
                        <h1>{{ room }}</h1>
                    </div>
                </div>
            </div>

            <div class="map-panel compact">
                <div class="floor-label">Room A</div>
                <div class="map-dots">
                    <span class="dot green"></span>
                    <span class="dot green"></span>
                    <span class="dot yellow"></span>
                </div>
            </div>

            <div class="panel-row">
                <div class="mini-card">Temperature<span>72°F</span></div>
                <div class="mini-card">Humidity<span>45%</span></div>
            </div>

            <div class="mini-card full">Pressure<span>1013 HPA</span></div>
            <div class="mini-card full">Air Quality<span>Moderate</span></div>
        </div>
    </div>
</div>
</body>
</html>
