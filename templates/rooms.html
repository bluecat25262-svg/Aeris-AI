<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aeris.AI - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="phone-shell">
    <div class="app-frame">
        <div class="app-screen">

            <!-- TOP ROW -->
            <div class="top-row">
                <div class="brand-row">
                    <div class="brand-avatar">M</div>
                    <span class="brand-name">AERIS.AI</span>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button id="refresh-btn" onclick="requestRefresh()" style="
                        height:40px; padding:0 14px; border-radius:12px;
                        background:var(--bg-card); border:1px solid var(--border);
                        color:var(--text); font-size:13px; font-weight:600;
                        cursor:pointer; display:flex; align-items:center; gap:7px;
                        font-family:'DM Sans',sans-serif;">
                        <span id="refresh-icon" style="font-size:16px;">⟳</span>
                        <span id="refresh-label">Refresh</span>
                    </button>
                    <div class="bell-btn">🔔</div>
                </div>
            </div>
            <div id="refresh-status" style="display:none; font-size:12px; color:var(--muted);
                background:var(--bg-card); border:1px solid var(--border);
                border-radius:10px; padding:10px 14px; text-align:center;"></div>

            <!-- STATS -->
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="section-label">Statistics</span>
                <span class="section-label">Today</span>
            </div>

            <div class="stats-grid">
                <!-- Active Sensors -->
                <div class="stat-card">
                    <span class="stat-label">Active Sensors</span>
                    <div class="stat-row">
                        <span class="stat-value">128</span>
                        <span class="stat-trend up">+3
                            <svg class="sparkline" width="44" height="22" viewBox="0 0 44 22" fill="none">
                                <polyline points="0,18 8,14 16,16 24,10 32,12 44,6" stroke="#3ddc84" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- System Health -->
                <div class="stat-card">
                    <span class="stat-label">System Health</span>
                    <div class="stat-row">
                        <span class="stat-value">98%</span>
                        <span class="stat-trend down">-2%
                            <svg class="sparkline" width="44" height="22" viewBox="0 0 44 22" fill="none">
                                <polyline points="0,6 8,8 16,7 24,10 32,12 44,17" stroke="#ff5c2e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Active Alerts -->
                <div class="stat-card">
                    <span class="stat-label">Active Alerts</span>
                    <div class="stat-row">
                        <span class="stat-value">5</span>
                        <span class="stat-trend down">+2
                            <svg class="sparkline" width="44" height="22" viewBox="0 0 44 22" fill="none">
                                <polyline points="0,16 8,12 16,14 24,9 32,13 44,7" stroke="#ff5c2e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Monthly Leaks -->
                <div class="stat-card">
                    <span class="stat-label">Monthly Leaks</span>
                    <div class="stat-row">
                        <span class="stat-value">12</span>
                        <span class="stat-trend up">-3
                            <svg class="sparkline" width="44" height="22" viewBox="0 0 44 22" fill="none">
                                <polyline points="0,6 8,10 16,8 24,13 32,11 44,16" stroke="#3ddc84" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>

            <!-- FACTORY MAP -->
            <div class="section-header">
                <span class="section-title">Factory Map View</span>
                <a class="view-all" href="/immediate">View all</a>
            </div>

            <div class="map-panel">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="floor-label">Floor #01</span>
                    <div class="map-legend">
                        <div class="legend-item"><span class="dot green"></span>Normal</div>
                        <div class="legend-item"><span class="dot yellow"></span>Warning</div>
                        <div class="legend-item"><span class="dot red"></span>Active Leak</div>
                    </div>
                </div>

                <div class="rooms-grid">
                    <div class="room-mini">
                        <span>Room - A</span>
                        <div class="room-dots-field">
                            <span class="dot green"></span>
                            <span class="dot green"></span>
                            <span class="dot green"></span>
                        </div>
                    </div>
                    <div class="room-mini">
                        <span>Room - B</span>
                        <div class="room-dots-field">
                            <span class="dot green"></span>
                            <span class="dot yellow"></span>
                        </div>
                    </div>
                    <div class="room-mini">
                        <span>Room - C</span>
                        <div class="room-dots-field">
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                    </div>
                    <div class="room-mini">
                        <span>Room - D</span>
                        <div class="room-dots-field">
                            <span class="dot green"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="floor-row">Floor #02</div>
            <div class="floor-row">Floor #03</div>

        </div>
    </div>
</div>

<script>
let pollInterval = null;

function setBtn(loading) {
    const btn = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    const label = document.getElementById('refresh-label');
    if (loading) {
        btn.disabled = true;
        btn.style.opacity = '0.6';
        icon.style.animation = 'spin 1s linear infinite';
        label.textContent = 'Waiting for Pi…';
    } else {
        btn.disabled = false;
        btn.style.opacity = '1';
        icon.style.animation = '';
        label.textContent = 'Refresh';
    }
}

function showStatus(msg, color) {
    const el = document.getElementById('refresh-status');
    el.style.display = 'block';
    el.style.color = color || 'var(--muted)';
    el.textContent = msg;
}

function requestRefresh() {
    setBtn(true);
    showStatus('⏳ Sending request to Raspberry Pi…', '#f5a623');
    fetch('/api/trigger/request', { method: 'POST' })
        .then(r => r.json())
        .then(() => {
            showStatus('📡 Pi is generating data (5s) then uploading…', '#f5a623');
            startPolling();
        })
        .catch(() => showStatus('❌ Failed to send request.', '#ff4c4c'));
}

function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    let attempts = 0;
    pollInterval = setInterval(() => {
        attempts++;
        fetch('/api/trigger/status')
            .then(r => r.json())
            .then(d => {
                if (d.status === 'idle' && d.completed_at) {
                    clearInterval(pollInterval);
                    setBtn(false);
                    showStatus('✅ Data refreshed! Reloading page…', '#3ddc84');
                    setTimeout(() => location.reload(), 1200);
                }
            });
        if (attempts > 60) { // 60s timeout
            clearInterval(pollInterval);
            setBtn(false);
            showStatus('⚠️ Pi did not respond in time. Check connection.', '#ff4c4c');
        }
    }, 1000);
}
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); display:inline-block; } }
#refresh-icon { display:inline-block; }
</style>
</body>
</html>
