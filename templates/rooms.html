<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeris.AI - Rooms</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div><strong>Aeris.AI</strong></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/rooms">Rooms</a>
        <a href="/alerts">Alerts</a>
        <a href="/immediate">Immediate</a>
    </div>
</div>

<div class="container">
    <h1 class="page-title">Room Sensors</h1>

    {% for room in rooms %}
    <a href="/room/{{ room.name }}" class="card room-card">
        <div class="room-left">
            <h3>{{ room.name }}</h3>
            <p>Risk Level: {{ room.risk }}</p>
        </div>
        <div class="room-right">
            <span class="status {{ room.risk }}">{{ room.risk.upper() }}</span>
        </div>
    </a>
    {% endfor %}
</div>

</body>
</html>
